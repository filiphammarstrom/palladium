<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palladium Fiction</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      gap: 2rem;
    }

    img {
      width: min(340px, 72vw);
      height: auto;
      display: block;
    }

    a {
      color: #009b8d;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.06em;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <img src="logo.png" alt="Palladium Fiction">
  <a href="mailto:info@palladiumfiction.se">info@palladiumfiction.se</a>
</body>
</html>
